<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found | Tech Mac</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --brand: #0f766e;
      --brand-dark: #0a4f4a;
      --accent: #f59e0b;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      background: linear-gradient(rgba(7,18,26,0.85), rgba(7,18,26,0.85)),
                  url('https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?auto=format&fit=crop&w=1600&q=80')
                  center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .error-box {
      text-align: center;
      max-width: 600px;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .error-code {
      font-size: 120px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .error-title {
      font-size: 32px;
      font-weight: 700;
      margin-top: 10px;
    }

    .error-desc {
      color: rgba(255,255,255,0.7);
      margin-top: 10px;
    }

    .btn-brand {
      background: var(--brand);
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      color: #fff;
      transition: 0.3s;
    }

    .btn-brand:hover {
      background: var(--brand-dark);
      transform: translateY(-2px);
    }

    .search-box {
      margin-top: 25px;
    }

    .form-control {
      border-radius: 50px;
      padding: 12px 20px;
      border: none;
    }

    .home-link {
      margin-top: 20px;
      display: inline-block;
      color: #fff;
      text-decoration: none;
      opacity: 0.8;
    }

    .home-link:hover {
      opacity: 1;
    }

    @media(max-width: 576px) {
      .error-code {
        font-size: 80px;
      }
      .error-title {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="error-box">
    <div class="error-code">404</div>

    <h2 class="error-title">Oops! Page Not Found</h2>

    <p class="error-desc">
      The page you’re looking for doesn’t exist or has been moved.
      Let’s get you back on track.
    </p>

    <!-- Search -->
    <div class="search-box">
      <form onsubmit="searchRedirect(event)">
        <div class="input-group">
          <input type="text" id="searchInput" class="form-control" placeholder="Search products or pages...">
          <button class="btn btn-brand" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>
    </div>

    <!-- Buttons -->
    <div class="mt-4 d-flex justify-content-center gap-3 flex-wrap">
      <a href="/" class="btn btn-brand">
        <i class="bi bi-house-door me-2"></i>Go Home
      </a>

      <a href="/contact" class="btn btn-outline-light">
        Contact Us
      </a>
    </div>

    <a href="/" class="home-link">
      <i class="bi bi-arrow-left"></i> Back to homepage
    </a>
  </div>

  <script>
    function searchRedirect(e) {
      e.preventDefault();
      const query = document.getElementById("searchInput").value;
      if (query) {
        window.location.href = "/?search=" + encodeURIComponent(query);
      }
    }
  </script>

</body>
</html>
