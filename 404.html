<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found | Tech Mac</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --blue: #2563eb;
      --green: #10b981;
      --dark: #0f172a;
      --light: #f8fafc;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.9)),
                  url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1600&q=80')
                  center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-container {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    .error-code {
      font-size: 110px;
      font-weight: 800;
      color: var(--blue);
      line-height: 1;
    }

    .error-code span {
      color: var(--green);
    }

    .error-title {
      font-size: 30px;
      font-weight: 700;
      color: var(--dark);
      margin-top: 10px;
    }

    .error-desc {
      color: #6b7280;
      margin-top: 10px;
    }

    .btn-main {
      background: linear-gradient(135deg, var(--blue), var(--green));
      border: none;
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-main:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-outline-custom {
      border: 2px solid var(--blue);
      color: var(--blue);
      border-radius: 50px;
      padding: 12px 24px;
      font-weight: 600;
    }

    .btn-outline-custom:hover {
      background: var(--blue);
      color: #fff;
    }

    .search-box {
      margin-top: 25px;
    }

    .form-control {
      border-radius: 50px;
      padding: 12px 18px;
      border: 1px solid #d1d5db;
    }

    .icon-box {
      width: 80px;
      height: 80px;
      margin: 0 auto 15px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--green));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
    }

    @media(max-width: 576px) {
      .error-code {
        font-size: 80px;
      }

      .error-title {
        font-size: 24px;
      }

      .error-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="error-container">

    <div class="error-code">4<span>0</span>4</div>

    <h2 class="error-title">Page Not Found</h2>

    <p class="error-desc">
      Sorry, the page you are looking for doesn’t exist or has been moved.
      Let’s get you back to the right place.
    </p>

    <!-- Buttons -->
    <div class="mt-4 d-flex justify-content-center gap-3 flex-wrap">
      <a href="/" class="btn btn-main">
        <i class="bi bi-house-door me-2"></i>Home
      </a>

      <a href="/contact" class="btn btn-outline-custom">
        Contact Us
      </a>
    </div>

  </div>

  <script>
    function searchRedirect(e) {
      e.preventDefault();
      const q = document.getElementById("searchInput").value;
      if(q){
        window.location.href = "/?search=" + encodeURIComponent(q);
      }
    }
  </script>

</body>
</html>
